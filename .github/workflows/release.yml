name: Release
run-name: Release stimulus-plumbers ${{ inputs.version }}
concurrency:
  group: release
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g. 1.0.0)
        required: true
        type: string

env:
  VERSION: ${{ inputs.version }}

jobs:
  npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stimulus-plumbers
    permissions:
      contents: write
      id-token: write
    environment: release
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: stimulus-plumbers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bump version ${{ env.VERSION }}
        run: npm version ${{ env.VERSION }} --no-git-tag-version

      - name: Commit package.json & package-lock.json
        uses: ryancyq/github-signed-commit@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          files: |
            stimulus-plumbers/package.json
            stimulus-plumbers/package-lock.json
          commit-message: "Bump @stimulus-plumbers/controllers version to ${{ env.VERSION }}"
          tag: stimulus-plumbers/v${{ env.VERSION }}

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: stimulus-plumbers-dist
          path: stimulus-plumbers/dist/

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  rubygem:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: npm
    defaults:
      run:
        working-directory: stimulus-plumbers-rails
    permissions:
      contents: write
      id-token: write
    environment: release
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: stimulus-plumbers-dist
          path: stimulus-plumbers-rails/app/assets/javascripts/stimulus-plumbers

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler: latest

      - name: Bump gem version ${{ env.VERSION }}
        run: bin/bump-version ${{ env.VERSION }}
        shell: bash

      - name: Commit Gemfile.lock & lib/stimulus_plumbers/version.rb
        uses: ryancyq/github-signed-commit@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          files: |
            stimulus-plumbers-rails/Gemfile.lock
            stimulus-plumbers-rails/lib/stimulus_plumbers/version.rb
          commit-message: "Bump stimulus_plumbers version to ${{ env.VERSION }}"
          tag: stimulus-plumbers-rails/v${{ env.VERSION }}

      - name: Build gem
        run: bundle exec rake build

      - name: Configure RubyGems trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Push gem
        run: |
          for gem in pkg/stimulus_plumbers-$VERSION*.gem ; do
            gem push "$gem" --host https://rubygems.org
          done
        shell: bash
